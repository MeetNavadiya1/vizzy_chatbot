name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Connect to the EC2 host and run the full monorepo deployment script.
      - name: Deploy Application Over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            # Sync the server workspace to the latest main branch commit.
            cd /var/www/app
            git fetch origin
            git reset --hard origin/main

            # Install backend dependencies, build, and reload the PM2 process.
            cd backend
            npm ci
            npm run build
            pm2 reload backend

            # Install frontend dependencies and create a fresh production build.
            cd ../frontend
            npm ci
            npm run build

            # Publish the new frontend assets to the Nginx web root.
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/

            # Reload Nginx so the latest frontend assets are served.
            sudo systemctl reload nginx

            # Persist PM2 process state and verify the backend is responding.
            pm2 save
            curl http://localhost:5000/health
